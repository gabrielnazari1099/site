<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Contato</title>
</head>
<body>
    <div>
        <h1 id="titulo_principal"> O Senhor dos Anéis</h1>
        <h2 class="titulo_secundario">Uma das trilogias mais famosas do cinema</h2>
        <nav>
            <a href="index.html">Home</a>
            <a href="sinopse.html">Sinopse</a>
            <a href="imagem do filme.html">Imagem do filme</a>
            <a href="Personagens principais.html">Personagens principais</a>
            <a href="Ordem dos Filmes.html">Ordem dos filmes</a>
            <a href="Informações.html">Informações</a>
            <a href="Curiosidades.html">Curiosidades</a>
            <a href="Impacto.html">Impacto Cultural</a>
            <a href="Contato.html">Contato</a>
        </nav>
    </div>
    <h2 class="titulo_secundario">Entre em contato:</h2>
    <form action="processa.php" method="post">
        <label for="nomepessoa" autocomplete="off">Nome:</label>
        <input type="text" name="nomepessoa" id="nomepessoa"
        minlength="3" maxlength="15" placeholder="Informe seu nome"
        required><br><br>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email" required
        placeholder="Informe seu email"><br><br>
        
        <label for="ano">Ano de nascimento:</label>
        <input type="number" name="ano" id="ano" max="2026" min="1900"
        placeholder="Informe ano de nascimento" required><br><br>

        <label for="telefone">Telefone:</label>
        <input type="tel" name="telefone" id="telefone"
        required placeholder="Informe seu telefone"><br><br>

        <label for="github">Informe seu github:</label>
        <input type="url" name="github" id="github" required 
        placeholder="Informe seu github"><br><br>

        <label for="senha">Informe seu github:</label>
        <input type="password" name="senha" id="senha" required 
        placeholder="Informe sua senha"><br><br>

        <label for="arquivo">Anexe um arquivo:</label>
        <input type="file" id="arquivo" name="arquivo":><br><br>

        <label for="cor">Escolha uma cor:</label>
        <input type="color" id="cor" name="cor"><br><br>
        <fieldset>
            <legend>Campos de tempo</legend>
            <label for="data">Informe a data:</label>
            <input type="date" id="data" name="data"><br><br>

            <label for="mes">Informe o mês:</label>
            <input type="month" name="mes" id="mes"><br><br>

            <label for="semana">Informe a semana:</label>
            <input type="week" name="semana" id="semana"><br><br>

            <label for="hora">Informe a hora:</label>
            <input type="time" name="hora" id="hora"><br><br>

            <label for="datahora">Data e hora atual:</label>
            <input type="datetime-local" name="datahora" id="datahora"><br>
        </fieldset><br>

        <label for="pesquisa">Pesquisa:</label>
        <input type="search" name="pesquisa" id="pesquisa"><br><br>

        <label for="descricao">Informe aqui o que você gosta nos filmes:</label><br>
        <textarea cols="30" rows="10" name="descricao" id="descricao"></textarea><br><br>

        <fieldset>
            <legend>Qual seu filme favorito?</legend>
            <label for="filme1"><input type="radio" name="filme" id="filme1"
            value="Filme 1">Filme 1</label>

            <label for="filme2"><input type="radio" name="filme" id="filme2"
            value="Filme 2">Filme 2</label>

            <label for="filme3"><input type="radio" name="filme" id="filme3"
            value="Filme 3">Filme 3</label>
        </fieldset><br>

        <select>
            <option value="filme 1">Filme 1</option>
            <option value="filme 2">Filme 2</option>
            <option value="filme 3">Filme 3</option>
        </select><br><br>

        <button type="reset">Limpar</button>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
